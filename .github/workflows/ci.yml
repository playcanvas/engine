name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: "npm"

      - name: Install dependencies
        run: npm clean-install --progress=false --no-fund

      - name: Build PlayCanvas
        run: npm run build

      - name: Run Publint
        run: npm run publint

      - name: Run Post-build tests
        run: npm run test:build

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: "npm"

      - name: Install dependencies
        run: npm clean-install --progress=false --no-fund

      - name: Build API reference manual
        run: npm run docs

      - name: Build Scripts API reference manual
        run: npm run docs:scripts

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: "npm"

      - name: Install dependencies
        run: npm clean-install --progress=false --no-fund

      - name: Run ESLint
        run: npm run lint

      - name: Run ESLint on examples
        working-directory: ./examples
        run: |
          npm clean-install --progress=false --no-fund
          npm run lint

  typescript-declarations:
    name: TypeScript Declarations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: "npm"

      - name: Install dependencies
        run: npm clean-install --progress=false --no-fund

      - name: Build TypeScript declarations
        run: npm run build:types

      - name: Compile TypeScript declarations
        run: npm run test:types

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: "npm"

      - name: Install dependencies
        run: npm clean-install --progress=false --no-fund

      - name: Run unit tests
        run: npm test

  build-examples:
    name: Build Examples Browser
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.1

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: "npm"

      - name: Install dependencies
        run: npm clean-install --progress=false --no-fund

      - name: Install examples dependencies
        working-directory: ./examples
        run: npm clean-install --progress=false --no-fund

      - name: Run Prettier on examples
        working-directory: ./examples
        run: npm run fmt

      - name: Run ESLint on examples
        working-directory: ./examples
        run: npm run lint

      - name: Build Examples Browser
        working-directory: ./examples
        run: npm run build
